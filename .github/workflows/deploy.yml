name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir _site
          cp index.html styles.css data.js bracket.js app.js _site/

      - name: Inject analytics ID (from repo variable GA4_ID)
        run: node scripts/inject-env.mjs _site/data.js
        env:
          GA4_ID: ${{ vars.GA4_ID }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
